<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>छात्र सूची</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;}

h2{text-align:center;}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th,td{
  padding:12px;
  border:1px solid #ccc;
  text-align:center;
}

th{
  background:#073B4C;
  color:white;
}
</style>
</head>

<body>

<h2>🎓 छात्र सूची</h2>

<table>
<tr>
  <th>नाम</th>
  <th>पिता का नाम</th>
  <th>कक्षा</th>
</tr>

<tr>
  <td>राम</td>
  <td>श्याम</td>
  <td>5</td>
</tr>

<tr>
  <td>सीता</td>
  <td>मोहन</td>
  <td>4</td>
</tr>

</table>

</body>
</html>
